name: Release MSIX

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 1.0.0.0)'
        required: true
        default: '1.0.0.0'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: windows-latest
    outputs:
      version: ${{ steps.version.outputs.value }}

    steps:
      - uses: actions/checkout@v4

      - name: Determine version
        id: version
        shell: pwsh
        run: |
          if ('${{ github.event_name }}' -eq 'workflow_dispatch') {
            $v = '${{ inputs.version }}'
          } else {
            $v = '${{ github.ref_name }}' -replace '^v',''
            if ($v -notmatch '^\d+\.\d+\.\d+\.\d+$') { $v = "$v.0" }
          }
          "value=$v" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Version: $v"

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Decode signing cert
        shell: pwsh
        env:
          PFX_BASE64: ${{ secrets.SIGNING_PFX_BASE64 }}
        run: |
          if (-not $env:PFX_BASE64) {
            Write-Error "Set the SIGNING_PFX_BASE64 secret (base64 of your .pfx)."
          }
          $bytes = [System.Convert]::FromBase64String($env:PFX_BASE64)
          [System.IO.File]::WriteAllBytes("$env:GITHUB_WORKSPACE\SwitchDesktops\SwitchDesktops_TemporaryKey.pfx", $bytes)

      - name: Generate placeholder assets
        shell: pwsh
        run: ./scripts/generate-placeholder-assets.ps1

      - name: Build MSIX
        shell: pwsh
        env:
          PFX_PASSWORD: ${{ secrets.SIGNING_PFX_PASSWORD }}
        run: |
          ./scripts/build-msix.ps1 -Version ${{ steps.version.outputs.value }} -PfxPassword $env:PFX_PASSWORD

      - name: Stamp .appinstaller version + URLs
        shell: pwsh
        env:
          VERSION: ${{ steps.version.outputs.value }}
          BASE_URL: ${{ vars.APPINSTALLER_BASE_URL }}
        run: |
          if (-not $env:BASE_URL) {
            Write-Error "Set repo variable APPINSTALLER_BASE_URL (e.g. https://user.github.io/switch-desktops/)"
          }
          $ai = Get-Content deploy/SwitchDesktops.appinstaller -Raw
          $ai = $ai -replace 'https://YOUR-USERNAME.github.io/switch-desktops/', $env:BASE_URL
          $ai = $ai -replace 'Version="1\.0\.0\.0"', "Version=""$env:VERSION"""
          $ai = $ai -replace 'SwitchDesktops_1\.0\.0\.0_x64\.msix', "SwitchDesktops_${env:VERSION}_x64.msix"
          Set-Content deploy/SwitchDesktops.appinstaller $ai

      - name: Export public cert for site
        shell: pwsh
        env:
          PFX_PASSWORD: ${{ secrets.SIGNING_PFX_PASSWORD }}
        run: |
          $securePwd = ConvertTo-SecureString -String $env:PFX_PASSWORD -Force -AsPlainText
          $cert = Get-PfxCertificate -FilePath "$env:GITHUB_WORKSPACE\SwitchDesktops\SwitchDesktops_TemporaryKey.pfx" -Password $securePwd
          Export-Certificate -Cert $cert -FilePath "$env:GITHUB_WORKSPACE\deploy\SwitchDesktops.cer" | Out-Null

      - name: Assemble Pages site
        shell: pwsh
        run: |
          $site = "$env:GITHUB_WORKSPACE\_site"
          New-Item -ItemType Directory -Force $site | Out-Null
          Copy-Item deploy\*.msix          $site
          Copy-Item deploy\*.appinstaller  $site
          Copy-Item deploy\index.html      $site
          Copy-Item deploy\SwitchDesktops.cer $site
          Get-ChildItem $site | ForEach-Object { Write-Host $_.Name }

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Upload MSIX to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            deploy/*.msix
            deploy/SwitchDesktops.cer
            deploy/SwitchDesktops.appinstaller

  deploy-pages:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
